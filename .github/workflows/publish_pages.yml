name: Publish GitHub Pages

on:
  # 手动触发（推荐）
  workflow_dispatch: {}
  # 提交代码后触发（main 分支）
  push:
    branches:
      - main
  # 定时触发（可按需调整；cron 为 UTC）
  schedule:
    # 说明：GitHub Actions 的 cron 只支持 UTC，不能直接写“北京时间”。
    # 北京时间（UTC+8）：
    # - 11:31 -> UTC 03:31
    # - 15:01 -> UTC 07:01
    - cron: "31 3 * * 1-5"
    - cron: "1 7 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # 提前切到 Node.js 24 执行 JavaScript actions，避免 2026-06-02 默认切换后踩坑
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # 统一时区（日志/生成时间/写入站点元信息）
  TZ: Asia/Shanghai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Beijing time (schedule only)
        id: timecheck
        if: ${{ github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          now_bj="$(date +'%H:%M')"
          echo "beijing_now=${now_bj}"
          # 说明：
          # - GitHub schedule 可能延迟启动（几分钟属于正常）
          # - 这里给一个容错窗口，避免因为延迟导致“误跳过”
          #
          # 双时点目标（北京时间）：11:31 / 15:01
          now_min=$((10#$(date +%H)*60 + 10#$(date +%M)))
          t1=$((11*60+31))
          t2=$((15*60+1))
          tol=10
          in_window=false
          if [ $(( now_min > t1 - tol && now_min < t1 + tol )) -eq 1 ]; then in_window=true; fi
          if [ $(( now_min > t2 - tol && now_min < t2 + tol )) -eq 1 ]; then in_window=true; fi
          if [ "${in_window}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Not in target time window (11:31/15:01 ± ${tol}m), skip."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Target time window hit, continue."
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        with:
          python-version: "3.11"

      - name: Make scripts executable
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          chmod +x ./qr.sh || true

      - name: Generate latest report (online fetch -> offline pipeline rebuild)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
        run: |
          if [ -z "${BIYING_TOKEN}" ]; then
            echo "Missing secrets.BIYING_TOKEN"
            exit 2
          fi
          # qr.sh fetch：仅在线取数落缓存（有成本）→ 再用 v2 pipeline 离线重建 → 输出 html/*tab-v1.html
          ./qr.sh fetch

      - name: Prepare Pages site (html/ as site root)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          report_html="$(ls -t ./html/*tab-v1.html 2>/dev/null | head -n 1 || true)"
          if [ -z "${report_html}" ]; then
            echo "No report html found in ./html/"
            ls -la ./html || true
            exit 2
          fi
          cp -f "${report_html}" ./html/index.html
          echo "site=index.html from: ${report_html}"
          export REPORT_HTML="${report_html}"

          # 写入站点元信息（用于排查“最新是否更新”、展示更新时间等）
          python - <<'PY'
          import json, os, time
          from datetime import datetime, timezone, timedelta
          tz = timezone(timedelta(hours=8))
          meta = {
            "built_at_bj": datetime.now(tz).strftime("%Y-%m-%d %H:%M:%S %z"),
            "built_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "event_name": os.getenv("GITHUB_EVENT_NAME"),
            "run_id": os.getenv("GITHUB_RUN_ID"),
            "sha": os.getenv("GITHUB_SHA"),
            "source_report": os.getenv("REPORT_HTML", ""),
          }
          # 环境变量里拿不到 report_html，这里用当前目录扫描一次兜底
          if not meta["source_report"]:
            try:
              import glob
              files = sorted(glob.glob("./html/*tab-v1.html"), key=os.path.getmtime, reverse=True)
              meta["source_report"] = files[0] if files else ""
            except Exception:
              pass
          with open("./html/site_meta.json", "w", encoding="utf-8") as f:
            json.dump(meta, f, ensure_ascii=False, indent=2)
          PY

          # 在首页顶部插入一行注释，便于肉眼确认“是否更新”
          bj="$(date +'%Y-%m-%d %H:%M:%S %Z')"
          sha="${GITHUB_SHA:-unknown}"
          sed -i "1s;^;<!-- built_at: ${bj} | sha: ${sha} -->\n;" ./html/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        with:
          path: ./html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
