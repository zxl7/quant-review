name: Publish GitHub Pages

on:
  # 手动触发（推荐）
  workflow_dispatch: {}
  # 提交代码后触发（main 分支）
  push:
    branches:
      - main
  # 定时触发（可按需调整；cron 为 UTC）
  schedule:
    # 说明：GitHub Actions 的 cron 只支持 UTC，不能直接写“北京时间”。
    # 北京时间（UTC+8）：
    # - 11:31 -> UTC 03:31
    # - 15:01 -> UTC 07:01
    - cron: "31 3 * * 1-5"
    - cron: "1 7 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # 提前切到 Node.js 24 执行 JavaScript actions，避免 2026-06-02 默认切换后踩坑
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Beijing time (schedule only)
        id: timecheck
        if: ${{ github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          now_bj="$(TZ=Asia/Shanghai date +'%H:%M')"
          echo "beijing_now=${now_bj}"
          # 双时点触发：11:30 / 15:00（北京时间）
          if [ "${now_bj}" != "11:31" ] && [ "${now_bj}" != "15:01" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Not target time (11:31/15:01), skip."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Target time hit (11:31/15:01), continue."
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        with:
          python-version: "3.11"

      - name: Make scripts executable
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          chmod +x ./qr.sh || true

      - name: Generate latest report (online fetch -> offline pipeline rebuild)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
        run: |
          if [ -z "${BIYING_TOKEN}" ]; then
            echo "Missing secrets.BIYING_TOKEN"
            exit 2
          fi
          # qr.sh fetch：仅在线取数落缓存（有成本）→ 再用 v2 pipeline 离线重建 → 输出 html/*tab-v1.html
          ./qr.sh fetch

      - name: Prepare Pages site (html/ as site root)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          report_html="$(ls -t ./html/*tab-v1.html 2>/dev/null | head -n 1 || true)"
          if [ -z "${report_html}" ]; then
            echo "No report html found in ./html/"
            ls -la ./html || true
            exit 2
          fi
          cp -f "${report_html}" ./html/index.html
          echo "site=index.html from: ${report_html}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        with:
          path: ./html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
