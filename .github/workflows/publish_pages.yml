          } >> "$GITHUB_OUTPUT"
          echo "Final stock research strategy: refresh_backtest=${refresh_backtest} validate_snapshot=${validate_snapshot} query_tag=${effective_query_tag:-<none>} reason=${resolution_reason}"

      - name: Ensure today auction snapshot before full publish
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' && steps.pushmode.outputs.mode != 'auction_prefetch' && steps.pushmode.outputs.mode != 'auction_prefetch_retry' }}
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
          RUN_DATE: ${{ steps.pushmode.outputs.date10 }}
          FORCE_OUTSIDE_WINDOW: ${{ github.event_name == 'schedule' && steps.pushmode.outputs.mode == 'open_fore' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from daily_review.application.workflow_schedule import execute_auction_snapshot_prefetch

          run_date = os.environ["RUN_DATE"]
          force_outside_window = os.environ.get("FORCE_OUTSIDE_WINDOW", "false") == "true"
          result = execute_auction_snapshot_prefetch(
              cache_dir=Path("cache"),
              trade_date10=run_date,
              force_outside_window=force_outside_window,
          )
          print("auction_snapshot_prefetch_execution=" + json.dumps(result, ensure_ascii=False, sort_keys=True))
          if result["ok"] and result["reason"] == "snapshot_ready_skip":
              print(f"auction_snapshot_ready_skip: trade_date={run_date} ready_source={result.get('ready_source') or '-'}")
              raise SystemExit(0)
          if result["ok"]:
              print(f"09:26_prefetch_then_full_publish: trade_date={run_date} path={result.get('path') or '-'} as_of={result.get('as_of') or '-'}")
              raise SystemExit(0)
          raise SystemExit(f"prefetch_plan_required_but_fetch_failed: trade_date={run_date} reason={result.get('reason') or '-'} last_error={result.get('last_error') or '-'}")
          PY

      - name: Generate latest full report (online fetch -> offline pipeline rebuild)
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' && steps.pushmode.outputs.mode != 'auction_prefetch' && steps.pushmode.outputs.mode != 'auction_prefetch_retry' }}
        timeout-minutes: 20
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
          QR_SKIP_CACHE_SYNC: "1"
          QR_SKIP_WATCHLIST_REFRESH: "1"
          QR_SKIP_ACCOUNT_METRICS_SYNC: "1"
          QR_DISABLE_PRD_V2_NETWORK: "1"
          QR_DISABLE_STOCK_RESEARCH_HISTORY_FETCH: ${{ steps.pushmode.outputs.mode == 'eod' && '0' || '1' }}
          QR_SKIP_WEB_BUILD: "1"
          QR_DISABLE_STOCK_RESEARCH_BACKTEST_REFRESH: ${{ steps.stockresearchfinal.outputs.refresh_backtest != 'true' && '1' || '0' }}
          QR_ENABLE_CORE_QUOTES_REFRESH: ${{ github.event_name == 'schedule' && steps.timecheck.outputs.mode == 'eod' && '1' || '0' }}
        run: |
          set -euo pipefail
          mode="${{ steps.pushmode.outputs.mode }}"
          schedule_mode="${{ steps.timecheck.outputs.mode || '' }}"
          query_tag="${{ steps.stockresearchfinal.outputs.effective_query_tag || '' }}"
          stock_research_refresh_enabled="${{ steps.stockresearchfinal.outputs.refresh_backtest == 'true' && 'true' || 'false' }}"
          is_trade_today="${{ steps.tradeday.outputs.is_trade_today }}"
          event_name="${{ github.event_name }}"
          echo "Run mode=${mode}"
          echo "Event name=${event_name}"
          echo "Schedule expr=${{ github.event.schedule || '' }}"
          echo "Schedule mode=${schedule_mode:-<none>}"
          echo "Schedule reason=${{ steps.timecheck.outputs.reason || '' }}"
          echo "Beijing now=${{ steps.timecheck.outputs.beijing_now || '' }}"
          echo "Stock research refresh enabled=${stock_research_refresh_enabled}"
          echo "Prefetched snapshot hit=${{ steps.stockresearchfinal.outputs.prefetched_found || 'false' }} as_of=${{ steps.stockresearchfinal.outputs.prefetched_as_of || '' }} source=${{ steps.stockresearchfinal.outputs.prefetched_source || '' }}"
          echo "Final stock_research_query_tag=${query_tag:-<none>} reason=${{ steps.stockresearchfinal.outputs.resolution_reason || '' }}"
          run_date="${{ steps.pushmode.outputs.date10 }}"
          if [ -z "${BIYING_TOKEN}" ]; then
            echo "Missing secrets.BIYING_TOKEN"
            exit 2
          fi
          # push / workflow_dispatch / schedule full 链路默认都走在线全量 fetch。
          if [ -n "${query_tag}" ]; then
            ./qr.sh fetch "${run_date}" "${query_tag}"
          else
            ./qr.sh fetch "${run_date}"
          fi
          expected_d8="$(echo "${run_date}" | tr -d '-')"
          # 盘中共振事件检测（从 xuangubao 缓存生成）
          D8="${expected_d8}" PYTHONPATH=. python3 - <<'PY'
          import os
          from pathlib import Path
          from daily_review.metrics.intraday_resonance import detect_resonance_from_cache, save_resonance_cache
          root = Path('.')
          d8 = os.environ['D8']
          results = detect_resonance_from_cache(root, d8)
          if results:
              p = save_resonance_cache(root, d8, results)
              print(f'Resonance saved: {p} ({len(results)} events)')
          else:
              print('No resonance events detected')
          PY
          expected_cache="cache/market_data-${expected_d8}.json"
          if [ ! -f "${expected_cache}" ]; then
            echo "Expected fresh cache not found: ${expected_cache}"
            ls -la cache || true
            exit 3
          fi
          RUN_DATE="${run_date}" EXPECTED_CACHE="${expected_cache}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          run_date = os.environ["RUN_DATE"]
          p = Path(os.environ["EXPECTED_CACHE"])
          data = json.loads(p.read_text(encoding="utf-8"))
          if data.get("date") != run_date:
              raise SystemExit(f"cache date mismatch: expected {run_date}, got {data.get('date')}")
          pan = data.get("panorama") or {}
          za = data.get("ztAnalysis") or {}
          meta = za.get("meta") or {}
          diag = meta.get("relayDiagnostics") or {}
          relay = za.get("relay") or []
          watch = za.get("watch") or []
          print("fresh_cache=", p)
          print("fresh_date=", data.get("date"))
          print("fresh_panorama=", {"limitUp": pan.get("limitUp"), "limitDown": pan.get("limitDown"), "ratio": pan.get("ratio")})
          print("fresh_ztAnalysis=", {"relay": len(relay), "watch": len(watch), "mode": meta.get("relaySelectionMode")})
          print("fresh_relay_names=", [x.get("name") for x in relay[:8] if isinstance(x, dict)])
          print("fresh_watch_names=", [x.get("name") for x in watch[:8] if isinstance(x, dict)])
          print("fresh_relay_diagnostics=", diag)
          if not relay and watch:
              print("WARNING: ztAnalysis relay empty while watch exists; publish continues because an empty relay pool can be valid in the latest full cache.")
          PY

      - name: Post-fetch cache sync and derived data
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        timeout-minutes: 6
        run: |
          set -euo pipefail
          run_date="${{ steps.pushmode.outputs.date10 }}"
          python3 manage_cache.py --date "${run_date}" --mode minimal --retention-days 7 --apply >/dev/null
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.timecheck.outputs.mode }}" != "eod" ]; then
            echo "Schedule event (non-eod): skip watchlist/account derived sync for daily snapshot limit"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
