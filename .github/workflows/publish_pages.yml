name: Publish gh-pages

on:
  # 手动触发（推荐）
  workflow_dispatch: {}
  # 提交代码后触发（main 分支）
  push:
    branches:
      - main
  # 定时触发（可按需调整；cron 为 UTC）
  schedule:
    # GitHub Actions cron 只支持 UTC（北京时间=UTC+8）
    # 盘中半小时快照（从 09:35 开始）：09:35 / 10:05 / 10:35 / 11:05 / 13:05 / 13:35 / 14:05 / 14:35
    # UTC 对应：01:35 / 02:05 / 02:35 / 03:05 / 05:05 / 05:35 / 06:05 / 06:35
    - cron: "35 1 * * 1-5"
    - cron: "5,35 2 * * 1-5"
    - cron: "5 3 * * 1-5"
    - cron: "5,35 5 * * 1-5"
    - cron: "5,35 6 * * 1-5"
    # 收盘后补一版（北京时间 15:01 -> UTC 07:01）
    - cron: "1 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: false

env:
  # 提前切到 Node.js 24 执行 JavaScript actions，避免 2026-06-02 默认切换后踩坑
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # 统一时区（日志/生成时间/写入站点元信息）
  TZ: Asia/Shanghai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Beijing time (schedule only)
        id: timecheck
        if: ${{ github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          now_bj="$(date +'%H:%M')"
          echo "beijing_now=${now_bj}"
          now_min=$((10#$(date +%H)*60 + 10#$(date +%M)))
          tol=15  # 允许 GitHub cron 延迟（实际可能延迟 10~15 分钟）

          # 盘中半小时快照（北京时间）：09:35 / 10:05 / 10:35 / 11:05 / 13:05 / 13:35 / 14:05 / 14:35
          targets=( $((9*60+35)) $((10*60+5)) $((10*60+35)) $((11*60+5)) $((13*60+5)) $((13*60+35)) $((14*60+5)) $((14*60+35)) )
          hit_intraday=false
          for t in "${targets[@]}"; do
            if [ $(( now_min > t - tol && now_min < t + tol )) -eq 1 ]; then
              hit_intraday=true
              break
            fi
          done

          # 收盘后补一版（北京时间 15:01）
          t_close=$((15*60+1))
          hit_close=false
          if [ $(( now_min > t_close - 20 && now_min < t_close + 20 )) -eq 1 ]; then
            hit_close=true
          fi

          if [ "${hit_close}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "mode=eod" >> "$GITHUB_OUTPUT"
            echo "Close window hit → eod"
          elif [ "${hit_intraday}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "mode=intraday" >> "$GITHUB_OUTPUT"
            echo "Intraday window hit → intraday"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            echo "Not in any window, skip."
          fi

      - name: Compute cache key (Beijing date)
        id: datekey
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          echo "d8=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Restore cache/ (persist intraday snapshots)
        uses: actions/cache@v4
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        with:
          path: cache
          key: cache-${{ runner.os }}-${{ steps.datekey.outputs.d8 }}

      - name: Setup Python
        uses: actions/setup-python@v6
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        with:
          python-version: "3.11"

      - name: Make scripts executable
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          chmod +x ./qr.sh || true

      - name: Generate latest report (online fetch -> offline pipeline rebuild)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
        run: |
          if [ -z "${BIYING_TOKEN}" ]; then
            echo "Missing secrets.BIYING_TOKEN"
            exit 2
          fi
          mode="${{ steps.timecheck.outputs.mode }}"
          if [ "${{ github.event_name }}" != "schedule" ]; then
            mode="eod"
          fi
          echo "Run mode=${mode}"
          if [ "${mode}" = "intraday" ]; then
            # 盘中快照：每半小时一次（数据截止当前时刻）
            PYTHONPATH=. python3 -m daily_review.cli --mode intraday
          else
            # 收盘版：在线取数落缓存（有成本）→ 再用 v2 pipeline 离线重建 → 输出 html/*tab-v1.html
            ./qr.sh fetch
          fi

      - name: Prepare Pages site (html/ as site root)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          report_html="$(ls -t ./html/*tab-v1.html 2>/dev/null | head -n 1 || true)"
          if [ -z "${report_html}" ]; then
            echo "No report html found in ./html/"
            ls -la ./html || true
            exit 2
          fi
          cp -f "${report_html}" ./html/index.html
          echo "site=index.html from: ${report_html}"
          export REPORT_HTML="${report_html}"

          # 写入站点元信息（用于排查“最新是否更新”、展示更新时间等）
          python - <<'PY'
          import json, os, time
          from datetime import datetime, timezone, timedelta
          tz = timezone(timedelta(hours=8))
          meta = {
            "built_at_bj": datetime.now(tz).strftime("%Y-%m-%d %H:%M:%S %z"),
            "built_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "event_name": os.getenv("GITHUB_EVENT_NAME"),
            "run_id": os.getenv("GITHUB_RUN_ID"),
            "sha": os.getenv("GITHUB_SHA"),
            "source_report": os.getenv("REPORT_HTML", ""),
          }
          # 环境变量里拿不到 report_html，这里用当前目录扫描一次兜底
          if not meta["source_report"]:
            try:
              import glob
              files = sorted(glob.glob("./html/*tab-v1.html"), key=os.path.getmtime, reverse=True)
              meta["source_report"] = files[0] if files else ""
            except Exception:
              pass
          with open("./html/site_meta.json", "w", encoding="utf-8") as f:
            json.dump(meta, f, ensure_ascii=False, indent=2)
          PY

          # 在首页顶部插入一行注释，便于肉眼确认“是否更新”
          bj="$(date +'%Y-%m-%d %H:%M:%S %Z')"
          sha="${GITHUB_SHA:-unknown}"
          sed -i "1s;^;<!-- built_at: ${bj} | sha: ${sha} -->\n;" ./html/index.html

      - name: Deploy to gh-pages branch
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./html
          publish_branch: gh-pages
          keep_files: true
          enable_jekyll: false
