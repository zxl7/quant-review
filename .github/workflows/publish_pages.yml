          from daily_review.application.workflow_schedule import validate_account_derivatives

          result = validate_account_derivatives(
              ledger_path=Path("data/account_nav_history.jsonl"),
              metrics_path=Path("data/account_strategy_metrics.json"),
              run_date10=os.environ["RUN_DATE"],
