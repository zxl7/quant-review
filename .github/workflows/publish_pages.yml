        run: |
          set -euo pipefail
          effective_query_tag="${{ steps.stockresearch.outputs.effective_query_tag || steps.stockresearchdefault.outputs.effective_query_tag || '' }}"
          resolution_reason="${{ steps.stockresearch.outputs.resolution_reason || steps.stockresearchdefault.outputs.resolution_reason || '' }}"
          refresh_backtest="${{ steps.stockresearch.outputs.refresh_backtest || steps.stockresearchdefault.outputs.refresh_backtest || 'false' }}"
          validate_snapshot="${{ steps.stockresearch.outputs.validate_snapshot || steps.stockresearchdefault.outputs.validate_snapshot || 'false' }}"
          prefetched_found="${{ steps.stockresearch.outputs.prefetched_found || steps.stockresearchdefault.outputs.prefetched_found || 'false' }}"
          prefetched_as_of="${{ steps.stockresearch.outputs.prefetched_as_of || steps.stockresearchdefault.outputs.prefetched_as_of || '' }}"
          prefetched_source="${{ steps.stockresearch.outputs.prefetched_source || steps.stockresearchdefault.outputs.prefetched_source || '' }}"
