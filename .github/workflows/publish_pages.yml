      - name: Validate stock research snapshot in published market data
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' && steps.stockresearchfinal.outputs.validate_snapshot == 'true' }}
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_DATE: ${{ steps.pushmode.outputs.date10 }}
          EFFECTIVE_DATE10: ${{ steps.publishsource.outputs.effective_date10 }}
          EFFECTIVE_REASON: ${{ steps.publishsource.outputs.effective_reason }}
          TODAY_BJ: ${{ steps.tradeday.outputs.today_bj }}
          IS_TRADE_TODAY: ${{ steps.tradeday.outputs.is_trade_today }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from daily_review.application.workflow_schedule import validate_market_data_stock_research_snapshot

          event_name = os.environ.get("EVENT_NAME", "").strip()
          run_date = os.environ["RUN_DATE"]
          effective_date = os.environ.get("EFFECTIVE_DATE10", "").strip() or run_date
          effective_reason = os.environ.get("EFFECTIVE_REASON", "").strip()
          today_bj = os.environ.get("TODAY_BJ", "").strip()
          is_trade_today = os.environ.get("IS_TRADE_TODAY", "").strip() == "true"
          enforce_trade_date = run_date
          if event_name == "push" and effective_reason == "fallback_latest_valid_full_cache":
              enforce_trade_date = effective_date
          if not is_trade_today or run_date != today_bj:
              print(
                  "published_stock_research_snapshot="
                  + json.dumps(
                      {
                          "ok": True,
                          "required": False,
                          "message": "skip_non_today_target",
                          "run_date": run_date,
                          "today_bj": today_bj,
                          "is_trade_today": is_trade_today,
                      },
                      ensure_ascii=False,
                      sort_keys=True,
                  )
              )
              raise SystemExit(0)
          market_path = Path("web/dist/market_data.json")
          payload = json.loads(market_path.read_text(encoding="utf-8"))
          published_date = str(payload.get("date") or "").strip()
          if published_date != enforce_trade_date:
              raise SystemExit(
                  f"published market_data date mismatch: expected {enforce_trade_date}, got {published_date or '<missing>'}"
              )
          result = validate_market_data_stock_research_snapshot(market_path, enforce_trade_date)
          diagnostics = (
              ((payload.get("stockResearchBacktest") or {}).get("realtimeBuy") or {}).get("diagnostics")
              if isinstance((payload.get("stockResearchBacktest") or {}).get("realtimeBuy"), dict)
              else {}
          )
          source_label = str((diagnostics or {}).get("source") or "").strip()
          if result["ok"]:
              result["publish_backtest_resolution"] = (
                  "source_backtest_rebuilt_at_publish"
                  if source_label in {"rebuilt_at_publish", "publish_rebuild", "forced_query", "workflow_prefetch"}
                  else "source_backtest_reused"
              )
          else:
              result["publish_backtest_resolution"] = "source_backtest_invalid_publish_blocked"
          result["requested_run_date"] = run_date
          result["effective_date10"] = effective_date
          result["effective_reason"] = effective_reason
          result["published_date"] = published_date
          print("published_stock_research_snapshot=" + json.dumps(result, ensure_ascii=False, sort_keys=True))
          if not result["ok"]:
              raise SystemExit(result["message"])
          PY

      - name: Validate eod stock research prediction pool
        if: ${{ github.event_name == 'schedule' && steps.timecheck.outputs.mode == 'eod' && steps.timecheck.outputs.skip != 'true' && steps.warmup.outputs.skip != 'true' && steps.tradeday.outputs.is_trade_today == 'true' && steps.pushmode.outputs.mode != 'intraday' }}
        env:
          RUN_DATE: ${{ steps.pushmode.outputs.date10 }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from daily_review.application.workflow_schedule import validate_eod_stock_research_prediction_pool

          result = validate_eod_stock_research_prediction_pool(
              Path("web/dist/market_data.json"),
              os.environ["RUN_DATE"],
          )
          print("published_stock_research_prediction_pool=" + json.dumps(result, ensure_ascii=False, sort_keys=True))
          if not result["ok"]:
              raise SystemExit(result["message"])
          PY

      - name: Validate intraday runtime indices in published artifacts
        if: ${{ github.event_name == 'schedule' && steps.timecheck.outputs.skip != 'true' && steps.warmup.outputs.skip != 'true' && steps.tradeday.outputs.is_trade_today == 'true' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          from daily_review.application.workflow_schedule import validate_intraday_runtime_indices

          result = validate_intraday_runtime_indices(Path("web/dist/intraday_runtime.json"))
          print("published_intraday_runtime_indices=" + json.dumps(result, ensure_ascii=False, sort_keys=True))
          if not result["ok"]:
