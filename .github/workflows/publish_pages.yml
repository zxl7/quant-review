name: Publish gh-pages

on:
  # 手动补跑
  workflow_dispatch:
    inputs:
      mode:
        description: "手动运行模式：auto/fetch/intraday/eod"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - fetch
          - intraday
          - eod
      date10:
        description: "指定交易日（YYYY-MM-DD），留空则自动判断"
        required: false
        default: ""
        type: string
      stock_research_query_tag:
        description: "个股研究竞价查询 tag；留空则自动预检今日快照，填 fore 可手动补抓一次"
        required: false
        default: ""
        type: string
  # 工作日北京时间 09:26-15:00 前执行盘中任务，并在 17:00 固定补一次收盘版发布：
  # - 09:26：直接执行一次正式 fetch，若当天快照缺失则补 fore（只补一次）
  # - 09:35-11:30 / 13:00-14:59：每 5 分钟心跳一次
  # - 15:00 之后不再定时执行盘中快照；仅保留 17:00 一次收盘版定时发布
  schedule:
    - cron: "26 1 * * 1-5"
    - cron: "35-55/5 1 * * 1-5"
    - cron: "*/5 2 * * 1-5"
    - cron: "0-30/5 3 * * 1-5"
    - cron: "*/5 5-6 * * 1-5"
    - cron: "59 6 * * 1-5"
    - cron: "0 9 * * 1-5"
  # 提交代码后触发（除 gh-pages 外的所有分支）
  push:
    branches:
      - "**"
      - "!gh-pages"

permissions:
  # 你的 Pages 使用 “Deploy from branch: gh-pages”，因此需要把生成结果直接提交到 gh-pages 分支
  contents: write

concurrency:
  # schedule 按 cron 通道分流，避免 09:26/open 或收盘重任务把 5 分钟盘中快照队列堵住。
  # push 与 workflow_dispatch 分通道串行：
  # - 各自通道内仍按分支串行，避免同一来源的重复发布互相覆盖；
  # - 手动触发不再和同分支 push 共用一个等待队列，避免 queued run 被“更高优先级等待项”顶掉。
  group: ${{ github.event_name == 'schedule' && format('gh-pages-publish-schedule-{0}', github.event.schedule) || github.event_name == 'workflow_dispatch' && format('gh-pages-publish-dispatch-{0}', github.ref_name) || format('gh-pages-publish-push-{0}', github.ref_name) }}
  # 不取消已在执行中的发布；仅让同通道的新请求接替旧的等待项。
  cancel-in-progress: false

env:
  # 提前切到 Node.js 24 执行 JavaScript actions，避免 2026-06-02 默认切换后踩坑
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # 统一时区（日志/生成时间/写入站点元信息）
  TZ: Asia/Shanghai
  # Actions 日志需要实时吐出，避免长时间在线 fetch 时看起来像卡死
  PYTHONUNBUFFERED: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      skip: ${{ steps.timecheck.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve schedule mode (schedule only)
        id: timecheck
        if: ${{ github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          schedule_expr="${{ github.event.schedule || '' }}"
          SCHEDULE_EXPR="${schedule_expr}" python3 - <<'PY'
          import os

          from daily_review.application.workflow_schedule import resolve_publish_schedule_mode

          result = resolve_publish_schedule_mode(
              event_name="schedule",
              schedule_expr=os.environ.get("SCHEDULE_EXPR", ""),
          )
          print(f"DEBUG: github.event.schedule={result['schedule_expr'] or '<empty>'}")
          print(f"DEBUG: beijing_now={result['beijing_now']}")
          print(f"DEBUG: resolved_mode={result['mode'] or '<empty>'}")
          print(f"DEBUG: schedule_reason={result['reason']}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"skip={result['skip']}\n")
              fh.write(f"mode={result['mode']}\n")
              fh.write(f"reason={result['reason']}\n")
              fh.write(f"beijing_now={result['beijing_now']}\n")
              fh.write(f"schedule_expr={result['schedule_expr']}\n")
          PY

      - name: Compute cache key (Beijing date)
        id: datekey
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          echo "d8=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # 不使用 actions/cache 恢复整包 cache/：同日多次运行易带上 runner 旧目录，与「每次全量拉数」冲突。
      # 盘中时间轴与依赖文件改由 cache_online + gh-pages/site_prev/cache 提供。

      - name: Seed cache from repository cache_online/
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          mkdir -p cache
          if [ -d "cache_online" ]; then
            cp -f cache_online/*.json cache/ 2>/dev/null || true
          fi

      - name: Checkout gh-pages (history cache + publish branch)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site_prev
          fetch-depth: 1
          persist-credentials: true

      - name: Restore history cache from gh-pages (keep last 7)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          mkdir -p cache
          mkdir -p cache_online
          mkdir -p site_prev/cache
          # 把 gh-pages 中沉淀的历史 cache 拉回工作区，供“趋势/分位”计算使用
          cp -f site_prev/cache/market_data-*.json cache/ 2>/dev/null || true
          # 线上依赖缓存：远端 render/rebuild 需要的本地依赖
          cp -f site_prev/cache/pools_cache.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/theme_cache.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/plate_rotate_cache.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/index_kline_cache.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/height_trend_cache.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/theme_trend_cache.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/concept_fund_flow_cache.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/money_flow_cache.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/trade_days_cache.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/stock_research_backtest_source.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/account_nav_history.jsonl cache/ 2>/dev/null || true
          cp -f site_prev/cache/account_strategy_metrics.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/stock_research_realtime_quotes-*.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/intraday_slices-*.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/intraday_snapshots-*.json cache/ 2>/dev/null || true
          # 个股回测价格历史缓存实际读取自 cache_online/，需要从 gh-pages 恢复以避免每次冷启动重拉历史 K 线。
          cp -f site_prev/cache/recommendation_price_history.json cache_online/ 2>/dev/null || true

          # 本地 cache 只保留最近 7 个交易日（按文件名 YYYYMMDD 排序）
          files=( $(ls -1 cache/market_data-*.json 2>/dev/null | sort || true) )
          if [ ${#files[@]} -gt 7 ]; then
            rm -f "${files[@]:0:${#files[@]}-7}"
          fi
          sfiles=( $(ls -1 cache/intraday_slices-*.json 2>/dev/null | sort || true) )
          if [ ${#sfiles[@]} -gt 2 ]; then
            rm -f "${sfiles[@]:0:${#sfiles[@]}-2}"
          fi
          rfiles=( $(ls -1 cache/stock_research_realtime_quotes-*.json 2>/dev/null | sort || true) )
          if [ ${#rfiles[@]} -gt 7 ]; then
            rm -f "${rfiles[@]:0:${#rfiles[@]}-7}"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        with:
          python-version: "3.11"

      - name: Check A-share trade day
        id: tradeday
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${BIYING_TOKEN}" ]; then
            echo "Missing secrets.BIYING_TOKEN"
            exit 2
          fi
          PYTHONPATH=. python3 - <<'PY'
          import os, re, json, datetime as dt
          from pathlib import Path
          from daily_review.config import load_config_from_env
          from daily_review.http import HttpClient
          from daily_review.data.biying import get_recent_trade_dates, get_realtime_market_date

          root = Path(".")
          cache_dir = root / "cache"

          def collect_local_trade_days():
            out = set()
            # 1) trade_days_cache（若最新则直接用）
            p = cache_dir / "trade_days_cache.json"
            try:
              if p.exists():
                data = json.loads(p.read_text(encoding="utf-8"))
                days = data.get("days") or []
                for d in days:
                  if isinstance(d, str) and re.match(r"^\d{4}-\d{2}-\d{2}$", d):
                    out.add(d)
            except Exception:
              pass

            # 2) pools_cache：通常比 trade_days_cache 更新
            p = cache_dir / "pools_cache.json"
            try:
              if p.exists():
                data = json.loads(p.read_text(encoding="utf-8"))
                pools = (data.get("pools") or {}) if isinstance(data, dict) else {}
                for pn in ("ztgc", "dtgc", "zbgc", "qsgc"):
                  mp = pools.get(pn) or {}
                  if isinstance(mp, dict):
                    for d in mp.keys():
                      if isinstance(d, str) and re.match(r"^\d{4}-\d{2}-\d{2}$", d):
                        out.add(d)
            except Exception:
              pass

            # 3) market_data 文件名：本地已成功构建过的日期也算可靠交易日
            try:
              for fp in cache_dir.glob("market_data-*.json"):
                m = re.match(r"market_data-(\d{8})\.json$", fp.name)
                if not m:
                  continue
                d8 = m.group(1)
                out.add(f"{d8[:4]}-{d8[4:6]}-{d8[6:8]}")
            except Exception:
              pass

            return sorted(out)

          cfg = load_config_from_env()
          client = HttpClient(base_url=cfg.base_url, token=cfg.token, timeout=30)
          today = dt.datetime.now().strftime("%Y-%m-%d")
          local_dates = collect_local_trade_days()

          rt_date = ""
          remote_dates = []
          if local_dates:
            dates = [d for d in local_dates if d <= today]
            latest_trade = dates[-1] if dates else local_dates[-1]
            is_trade_today = "true" if today in local_dates else "false"
            source = "local_cache"
          else:
            dates = []
            latest_trade = today
            is_trade_today = "false"
            source = "remote_fallback"

          # 封板前兜底：若本地缓存尚未滚到今天，向远端再确认一次，避免交易日误判成非交易日
          if is_trade_today != "true":
            remote_dates = get_recent_trade_dates(client, n=20) or []
            rt_date = get_realtime_market_date(client)
            if remote_dates:
              dates = [d for d in remote_dates if d <= today]
              if dates:
                latest_trade = dates[-1]
              else:
                latest_trade = remote_dates[-1]
            if today in remote_dates or rt_date == today or today in local_dates:
              latest_trade = today
              is_trade_today = "true"
            else:
              is_trade_today = "false"
            source = "local_cache+remote_verify" if local_dates else "remote_fallback"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"today_bj={today}\n")
            f.write(f"latest_trade_date={latest_trade}\n")
            f.write(f"realtime_market_date={rt_date}\n")
            f.write(f"is_trade_today={is_trade_today}\n")
            f.write(f"trade_day_source={source}\n")
          merged_dates = sorted(set(local_dates) | set(remote_dates) | ({rt_date} if rt_date else set()) | ({today} if is_trade_today == "true" else set()))
          if merged_dates:
            payload = {
              "days": merged_dates,
              "latest_trade_date": latest_trade,
              "today_bj": today,
              "realtime_market_date": rt_date,
              "is_trade_today": is_trade_today == "true",
              "source": source,
            }
            cache_dir.mkdir(parents=True, exist_ok=True)
            (cache_dir / "trade_days_cache.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print("today_bj=", today)
          print("latest_trade_date=", latest_trade)
          print("trade_day_source=", source)
          print("realtime_market_date=", rt_date)
          print("is_trade_today=", is_trade_today)
          print(f"DEBUG: today={today}, remote_dates_count={len(remote_dates)}, rt_date={rt_date}")
          PY

      - name: Guard early publish warmup window
        id: warmup
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          now_min=$((10#$(date +%H)*60 + 10#$(date +%M)))
          input_mode="${{ github.event.inputs.mode || '' }}"
          event_name="${{ github.event_name }}"
          is_trade_today="${{ steps.tradeday.outputs.is_trade_today }}"
          schedule_mode="${{ steps.timecheck.outputs.mode || '' }}"

          # 仅对常规定时窗口保留这层保护；
          # - 9:26 的 schedule 会先做快照预检，再决定是否补 fore；
          # - push / workflow_dispatch 允许立即进入主流程，并在缺快照时自动补 fore。
          warmup_hit=false
          if [ "${event_name}" = "schedule" ] && [ "${schedule_mode}" = "open_fore" ]; then
            warmup_hit=false
          elif [ "${event_name}" = "push" ]; then
            warmup_hit=false
          elif [ "${is_trade_today}" = "true" ] && [ $(( now_min >= 9*60+25 && now_min < 9*60+35 )) -eq 1 ]; then
            warmup_hit=true
          fi

          explicit_manual=false
          if [ "${event_name}" = "workflow_dispatch" ] && [ -n "${input_mode}" ] && [ "${input_mode}" != "auto" ]; then
            explicit_manual=true
          fi

          if [ "${warmup_hit}" = "true" ] && [ "${explicit_manual}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Early publish warmup window hit (09:25-09:34 Beijing) -> skip main publish"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Warmup guard passed"
          fi

      - name: Decide run mode/date
        id: pushmode
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' }}
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
        run: |
          set -euo pipefail
          latest_trade="${{ steps.tradeday.outputs.latest_trade_date }}"
          today_bj="${{ steps.tradeday.outputs.today_bj }}"
          realtime_market_date="${{ steps.tradeday.outputs.realtime_market_date }}"
          input_mode="${{ github.event.inputs.mode || '' }}"
          input_date10="${{ github.event.inputs.date10 || '' }}"
          input_query_tag="${{ github.event.inputs.stock_research_query_tag || '' }}"
          schedule_mode="${{ steps.timecheck.outputs.mode || '' }}"

          if [ -n "${input_date10}" ]; then
            if ! printf '%s' "${input_date10}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "Invalid workflow_dispatch input date10=${input_date10}, expected YYYY-MM-DD"
              exit 2
            fi
            date10="${input_date10}"
          elif [ "${realtime_market_date}" = "${today_bj}" ]; then
            date10="${today_bj}"
          else
            date10="${latest_trade}"
          fi
          if [ -z "${date10:-}" ]; then
            echo "Unable to resolve latest trade date"
            exit 2
          fi
          now_min=$((10#$(date +%H)*60 + 10#$(date +%M)))
          mode="fetch"
          if [ "${input_mode}" = "fetch" ] || [ "${input_mode}" = "intraday" ] || [ "${input_mode}" = "eod" ]; then
            mode="${input_mode}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${schedule_mode}" = "intraday" ]; then
              mode="intraday"
            elif [ "${schedule_mode}" = "eod" ]; then
              mode="eod"
            elif [ "${schedule_mode}" = "open_fore" ]; then
              mode="fetch"
            else
              mode="fetch"
            fi
          fi
          if [ "${input_mode}" = "auto" ] || [ -z "${input_mode}" ]; then
            if [ $(( now_min >= 15*60 && now_min <= 17*60+59 )) -eq 1 ]; then
              mode="eod"
            fi
          fi
          if [ "${input_mode}" = "eod" ]; then
            mode="eod"
          fi
          echo "event=${{ github.event_name }} schedule=${{ github.event.schedule || '' }} input_mode=${input_mode:-auto} query_tag=${input_query_tag:-none} -> mode=${mode} date10=${date10}"
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"
          echo "date10=${date10}" >> "$GITHUB_OUTPUT"
          echo "stock_research_query_tag=${input_query_tag}" >> "$GITHUB_OUTPUT"
          echo "run_mode=${mode} (date10=${date10})"

      - name: Make scripts executable
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          chmod +x ./qr.sh || true

      - name: Install Python dependencies (full publish only)
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && steps.pushmode.outputs.mode != 'intraday' }}
        run: pip install -r requirements.txt

      - name: Setup Node.js (full publish only)
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && steps.pushmode.outputs.mode != 'intraday' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web dependencies (full publish only)
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && steps.pushmode.outputs.mode != 'intraday' }}
        run: cd web && npm ci

      - name: Resolve stock research query tag
        id: stockresearch
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        run: |
          set -euo pipefail
          mode="${{ steps.pushmode.outputs.mode }}"
          run_date="${{ steps.pushmode.outputs.date10 }}"
          is_trade_today="${{ steps.tradeday.outputs.is_trade_today }}"
          input_query_tag="${{ github.event.inputs.stock_research_query_tag || '' }}"
          MODE="${mode}" \
          RUN_DATE="${run_date}" \
          IS_TRADE_TODAY="${is_trade_today}" \
          INPUT_QUERY_TAG="${input_query_tag}" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from daily_review.application.workflow_schedule import resolve_stock_research_query_plan

          mode = os.environ["MODE"].strip()
          run_date = os.environ["RUN_DATE"].strip()
          is_trade_today = os.environ["IS_TRADE_TODAY"].strip() == "true"
          input_query_tag = os.environ["INPUT_QUERY_TAG"].strip()

          plan = resolve_stock_research_query_plan(
              mode=mode,
              trade_date10=run_date,
              is_trade_today=is_trade_today,
              input_query_tag=input_query_tag,
              cache_dir=Path("cache"),
          )
          prefetched = plan["prefetched_snapshot"]
          market = plan["market_data_snapshot"]
          print("stock_research_query_plan=" + json.dumps(plan, ensure_ascii=False, sort_keys=True))
          print(
              "Prefetched snapshot: "
              f"found={prefetched.get('found')} "
              f"as_of={prefetched.get('as_of') or '-'} "
              f"source={prefetched.get('source') or '-'} "
              f"path={prefetched.get('path') or '-'}"
          )
          print(
              "Cached market_data snapshot: "
              f"found={market.get('found')} "
              f"quote_time={market.get('quote_time') or '-'} "
              f"source={market.get('source') or '-'} "
              f"path={market.get('path') or '-'}"
          )
          print(
              "Resolved stock research query tag: "
              f"{plan['effective_query_tag'] or '<none>'} "
              f"(reason={plan['resolution_reason']})"
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"effective_query_tag={plan['effective_query_tag']}\n")
              fh.write(f"resolution_reason={plan['resolution_reason']}\n")
              fh.write(f"prefetched_found={'true' if prefetched.get('found') else 'false'}\n")
              fh.write(f"prefetched_as_of={prefetched.get('as_of') or ''}\n")
              fh.write(f"prefetched_source={prefetched.get('source') or ''}\n")
          PY

      - name: Generate latest report (online fetch -> offline pipeline rebuild)
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        timeout-minutes: 20
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
          QR_SKIP_CACHE_SYNC: "1"
          QR_SKIP_WATCHLIST_REFRESH: "1"
          QR_SKIP_ACCOUNT_METRICS_SYNC: "1"
          QR_DISABLE_PRD_V2_NETWORK: "1"
          QR_DISABLE_STOCK_RESEARCH_HISTORY_FETCH: "1"
          QR_SKIP_WEB_BUILD: "1"
        run: |
          set -euo pipefail
          mode="${{ steps.pushmode.outputs.mode }}"
          schedule_mode="${{ steps.timecheck.outputs.mode || '' }}"
          query_tag="${{ steps.stockresearch.outputs.effective_query_tag || '' }}"
          is_trade_today="${{ steps.tradeday.outputs.is_trade_today }}"
          event_name="${{ github.event_name }}"
          echo "Run mode=${mode}"
          echo "Event name=${event_name}"
          echo "Schedule expr=${{ github.event.schedule || '' }}"
          echo "Schedule mode=${schedule_mode:-<none>}"
          echo "Schedule reason=${{ steps.timecheck.outputs.reason || '' }}"
          echo "Beijing now=${{ steps.timecheck.outputs.beijing_now || '' }}"
          echo "Prefetched snapshot hit=${{ steps.stockresearch.outputs.prefetched_found || 'false' }} as_of=${{ steps.stockresearch.outputs.prefetched_as_of || '' }} source=${{ steps.stockresearch.outputs.prefetched_source || '' }}"
          echo "Final stock_research_query_tag=${query_tag:-<none>} reason=${{ steps.stockresearch.outputs.resolution_reason || '' }}"
          run_date="${{ steps.pushmode.outputs.date10 }}"
          if [ "${mode}" = "intraday" ]; then
            # 盘中：只跑轻量 intraday，刷新实时情绪/快照；明日接力/观察保留上一份收盘推演。
            PRESERVE_ZT_ANALYSIS=1 PYTHONPATH=. python3 -u -m daily_review.cli --mode intraday --date "${run_date}"
          elif [ "${event_name}" = "push" ]; then
            echo "Push event: prefer offline rebuild from restored cache"
            PYTHONPATH=. python3 -u -m daily_review.cli --date "${run_date}" --rebuild
          else
            if [ -z "${BIYING_TOKEN}" ]; then
              echo "Missing secrets.BIYING_TOKEN"
              exit 2
            fi
            # 先预检今天是否已有有效财富密码快照；没有才补 fore。
            if [ -n "${query_tag}" ]; then
              ./qr.sh fetch "${run_date}" "${query_tag}"
            else
              # 其他触发方式：保持原有在线全量 fetch。
              ./qr.sh fetch "${run_date}"
            fi
          fi
          expected_d8="$(echo "${run_date}" | tr -d '-')"
          # 盘中共振事件检测（从 xuangubao 缓存生成）
          D8="${expected_d8}" PYTHONPATH=. python3 - <<'PY'
          import os
          from pathlib import Path
          from daily_review.metrics.intraday_resonance import detect_resonance_from_cache, save_resonance_cache
          root = Path('.')
          d8 = os.environ['D8']
          results = detect_resonance_from_cache(root, d8)
          if results:
              p = save_resonance_cache(root, d8, results)
              print(f'Resonance saved: {p} ({len(results)} events)')
          else:
              print('No resonance events detected')
          PY
          expected_cache="cache/market_data-${expected_d8}.json"
          if [ "${mode}" = "intraday" ]; then
            expected_cache="cache/market_data-${expected_d8}-intraday.json"
          fi
          if [ ! -f "${expected_cache}" ]; then
            echo "Expected fresh cache not found: ${expected_cache}"
            ls -la cache || true
            exit 3
          fi
          RUN_DATE="${run_date}" EXPECTED_CACHE="${expected_cache}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          run_date = os.environ["RUN_DATE"]
          p = Path(os.environ["EXPECTED_CACHE"])
          data = json.loads(p.read_text(encoding="utf-8"))
          if data.get("date") != run_date:
              raise SystemExit(f"cache date mismatch: expected {run_date}, got {data.get('date')}")
          pan = data.get("panorama") or {}
          za = data.get("ztAnalysis") or {}
          meta = za.get("meta") or {}
          diag = meta.get("relayDiagnostics") or {}
          relay = za.get("relay") or []
          watch = za.get("watch") or []
          print("fresh_cache=", p)
          print("fresh_date=", data.get("date"))
          print("fresh_panorama=", {"limitUp": pan.get("limitUp"), "limitDown": pan.get("limitDown"), "ratio": pan.get("ratio")})
          print("fresh_ztAnalysis=", {"relay": len(relay), "watch": len(watch), "mode": meta.get("relaySelectionMode")})
          print("fresh_relay_names=", [x.get("name") for x in relay[:8] if isinstance(x, dict)])
          print("fresh_watch_names=", [x.get("name") for x in watch[:8] if isinstance(x, dict)])
          print("fresh_relay_diagnostics=", diag)
          if not relay and watch:
              print("WARNING: ztAnalysis relay empty while watch exists; publish continues because an empty relay pool can be valid intraday.")
          PY

      - name: Post-fetch cache sync and derived data
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        timeout-minutes: 6
        run: |
          set -euo pipefail
          run_date="${{ steps.pushmode.outputs.date10 }}"
          python3 manage_cache.py --date "${run_date}" --mode minimal --retention-days 7 --apply >/dev/null
          if [ "${{ github.event_name }}" != "push" ]; then
            PYTHONPATH=. python3 tools/fetch_watchlist.py --date "${run_date}" --skip-fetch || echo "⚠ watchlist rebuild failed, using cache"
            PYTHONPATH=. python3 scripts/build_account_nav_ledger.py >/dev/null || echo "⚠ account nav ledger sync failed"
            PYTHONPATH=. python3 scripts/build_account_strategy_metrics.py >/dev/null || echo "⚠ account strategy metrics sync failed"
          else
            echo "Push event: skip heavy derived rebuilds and reuse restored caches"
          fi

      - name: Generate intraday runtime only
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.pushmode.outputs.mode == 'intraday' && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') }}
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
        run: |
          set -euo pipefail
          run_date="${{ steps.pushmode.outputs.date10 }}"
          ./qr.sh watch-slice "${run_date}"
          D8="$(echo "${run_date}" | tr -d '-')"
          D8="${D8}" PYTHONPATH=. python3 - <<'PY'
          import os
          from pathlib import Path
          from daily_review.metrics.intraday_resonance import detect_resonance_from_cache, save_resonance_cache
          root = Path('.')
          d8 = os.environ['D8']
          results = detect_resonance_from_cache(root, d8)
          if results:
              p = save_resonance_cache(root, d8, results)
              print(f'Resonance saved: {p} ({len(results)} events)')
          else:
              print('No resonance events detected')
          PY
          cp -f ./cache_online/intraday_resonance-"${D8}".json ./web/public/intraday_resonance.json 2>/dev/null || true

      - name: Pre-fetch external data (明日策略池 + 东方财富今日题材)
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            python3 tools/fetch_tomorrow_picks.py web/public/tomorrow_picks.json || echo "⚠ tomorrow picks fetch failed, using cache"
            python3 tools/fetch_eastmoney_tomorrow.py web/public/eastmoney_tomorrow.json || echo "⚠ eastmoney tomorrow fetch failed, using cache"
          else
            echo "Push event: skip external tomorrow-data fetch and reuse published artifacts if present"
          fi

      - name: Build Vue3 web (Vite -> single HTML)
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        run: cd web && npm run build

      - name: Inject market data into Vue3 HTML
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        env:
          RUN_DATE: ${{ steps.pushmode.outputs.date10 }}
          QR_DISABLE_STOCK_RESEARCH_BACKTEST_REBUILD: "1"
          QR_DISABLE_STOCK_RESEARCH_HISTORY_FETCH: "1"
        run: |
          run_date="${RUN_DATE}"
          d8="$(echo "${run_date}" | tr -d '-')"
          source_path="cache/market_data-${d8}.json"
          if [ "${{ steps.pushmode.outputs.mode }}" = "intraday" ]; then
            source_path="cache/market_data-${d8}-intraday.json"
          fi
          python3 inject_data.py "${d8}" --source "${source_path}"

      - name: Validate stock research snapshot in published market data
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        env:
          RUN_DATE: ${{ steps.pushmode.outputs.date10 }}
          TODAY_BJ: ${{ steps.tradeday.outputs.today_bj }}
          IS_TRADE_TODAY: ${{ steps.tradeday.outputs.is_trade_today }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from daily_review.application.workflow_schedule import validate_market_data_stock_research_snapshot

          run_date = os.environ["RUN_DATE"]
          today_bj = os.environ.get("TODAY_BJ", "").strip()
          is_trade_today = os.environ.get("IS_TRADE_TODAY", "").strip() == "true"
          if not is_trade_today or run_date != today_bj:
              print(
                  "published_stock_research_snapshot="
                  + json.dumps(
                      {
                          "ok": True,
                          "required": False,
                          "message": "skip_non_today_target",
                          "run_date": run_date,
                          "today_bj": today_bj,
                          "is_trade_today": is_trade_today,
                      },
                      ensure_ascii=False,
                      sort_keys=True,
                  )
              )
              raise SystemExit(0)
          market_path = Path("web/dist/market_data.json")
          result = validate_market_data_stock_research_snapshot(market_path, run_date)
          print("published_stock_research_snapshot=" + json.dumps(result, ensure_ascii=False, sort_keys=True))
          if not result["ok"]:
              raise SystemExit(result["message"])
          PY

      - name: Prepare Pages site
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        run: |
          set -euo pipefail
          report_html="./web/dist/index.html"
          if [ -z "${report_html}" ]; then
            echo "No publishable html found."
            ls -la ./web/dist || true
            exit 2
          fi
          [ -f "${report_html}" ] || {
            echo "Missing publishable html: ${report_html}"
            ls -la ./web/dist || true
            exit 2
          }
          run_date="${{ steps.pushmode.outputs.date10 }}"
          d8="$(echo "${run_date}" | tr -d '-')"
          source_path="cache/market_data-${d8}.json"
          if [ "${{ steps.pushmode.outputs.mode }}" = "intraday" ]; then
            source_path="cache/market_data-${d8}-intraday.json"
          fi
          if [ ! -f "${source_path}" ]; then
            echo "Source market data not found: ${source_path}"
            ls -la cache || true
            exit 3
          fi
          if ! python3 -c 'import json, sys; data = json.load(open(sys.argv[1], encoding="utf-8")); raise SystemExit(0 if str(data.get("date") or "") == sys.argv[2] else 1)' "${source_path}" "${run_date}"; then
            echo "Source market data date mismatch: expected ${run_date} in ${source_path}"
            exit 3
          fi
          # 发布目录：只保留“最新一份报告 + index.html”
          rm -rf ./site
          mkdir -p ./site
          cp -f "${report_html}" ./site/
          cp -f "${report_html}" ./site/index.html
          # market_data 是新 web 路径下 HTML 运行时 fetch 的必需文件，必须随 index.html 发布
          missing=()
          for f in market_data.json market_data.js; do
            if [ -f "./web/dist/${f}" ]; then
              cp -f "./web/dist/${f}" "./site/${f}"
            else
              missing+=("${f}")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required runtime data files in web/dist: ${missing[*]}"
            ls -la ./web/dist || true
            exit 4
          fi
          # 旁路数据（前端有兜底逻辑，缺失不致命）：优先 web/dist，回退 web/public
          for f in tomorrow_picks.json tomorrow_picks.js eastmoney_tomorrow.json intraday_resonance.json intraday_runtime.json; do
            if [ -f "./web/dist/${f}" ]; then
              cp -f "./web/dist/${f}" "./site/${f}"
            elif [ -f "./web/public/${f}" ]; then
              cp -f "./web/public/${f}" "./site/${f}"
            fi
          done
          cp -f ./cache_online/intraday_resonance-*.json ./site/ 2>/dev/null || true
          touch ./site/.nojekyll
          echo "site=index.html from: ${report_html}"
          echo "site data files:"
          ls -la ./site/ | grep -E '\.(json|js|html)$' || true

      - name: Commit intraday runtime only to gh-pages
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.pushmode.outputs.mode == 'intraday' && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') }}
        run: |
          set -euo pipefail
          cp -f ./web/public/intraday_runtime.json site_prev/intraday_runtime.json
          if [ -f ./web/public/intraday_resonance.json ]; then
            cp -f ./web/public/intraday_resonance.json site_prev/intraday_resonance.json
          fi
          mkdir -p site_prev/cache
          cp -f cache/intraday_slices-*.json site_prev/cache/ 2>/dev/null || true
          sfiles=( $(ls -1 site_prev/cache/intraday_slices-*.json 2>/dev/null | sort || true) )
          if [ ${#sfiles[@]} -gt 2 ]; then
            rm -f "${sfiles[@]:0:${#sfiles[@]}-2}"
          fi
          if git -C site_prev diff --quiet; then
            echo "No intraday runtime changes to commit."
            exit 0
          fi
          git -C site_prev status --porcelain
          git -C site_prev config user.name "github-actions[bot]"
          git -C site_prev config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site_prev add intraday_runtime.json intraday_resonance.json cache/intraday_slices-*.json 2>/dev/null || true
          git -C site_prev commit -m "deploy: intraday runtime" || true
          push_rc=1
          for attempt in 1 2 3; do
            if git -C site_prev push origin HEAD:gh-pages; then
              echo "Push intraday runtime to gh-pages succeeded on attempt ${attempt}"
              push_rc=0
              break
            fi
            push_rc=$?
            echo "Push intraday runtime failed on attempt ${attempt} (rc=${push_rc})"
            if [ "${attempt}" -lt 3 ]; then
              sleep $((attempt * 5))
              git -C site_prev fetch origin gh-pages || true
              git -C site_prev rebase origin/gh-pages || {
                git -C site_prev rebase --abort || true
                echo "Rebase against origin/gh-pages failed; retrying push without rebase"
              }
            fi
          done
          exit "${push_rc}"

      - name: Commit & push to gh-pages
        if: ${{ (github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true') && steps.warmup.outputs.skip != 'true' && (github.event_name != 'schedule' || steps.tradeday.outputs.is_trade_today == 'true') && steps.pushmode.outputs.mode != 'intraday' }}
        run: |
          set -euo pipefail
          # 将构建产物覆盖写入 gh-pages 根目录（Deploy from branch: /）
          cp -f ./site/.nojekyll site_prev/.nojekyll
          cp -f ./site/index.html site_prev/index.html
          # 把报告文件也一并带上（便于历史访问）
          for f in ./site/*.html; do
            if [ -f "$f" ]; then cp -f "$f" site_prev/; fi
          done
          # 运行时数据文件（market_data 是必需，其余有兜底）一律从 ./site/ 镜像到 gh-pages
          for f in market_data.json market_data.js \
                   tomorrow_picks.json tomorrow_picks.js eastmoney_tomorrow.json intraday_resonance.json intraday_runtime.json; do
            if [ -f "./site/${f}" ]; then
              cp -f "./site/${f}" "site_prev/${f}"
            fi
          done
          if [ ! -f site_prev/market_data.json ] || [ ! -f site_prev/market_data.js ]; then
            echo "FATAL: market_data.{json,js} missing in site_prev/, aborting push"
            ls -la site_prev/ || true
            exit 5
          fi

          # 同步历史 cache（只保留最近 7 个 market_data-YYYYMMDD.json）
          mkdir -p site_prev/cache
          cp -f cache/market_data-*.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/pools_cache.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/theme_cache.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/plate_rotate_cache.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/index_kline_cache.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/height_trend_cache.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/theme_trend_cache.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/concept_fund_flow_cache.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/money_flow_cache.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/trade_days_cache.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/stock_research_backtest_source.json site_prev/cache/ 2>/dev/null || true
          cp -f cache_online/recommendation_price_history.json site_prev/cache/ 2>/dev/null || true
          if [ -f data/account_nav_history.jsonl ]; then
            cp -f data/account_nav_history.jsonl site_prev/cache/account_nav_history.jsonl
          elif [ -f cache/account_nav_history.jsonl ]; then
            cp -f cache/account_nav_history.jsonl site_prev/cache/account_nav_history.jsonl
          fi
          if [ -f data/account_strategy_metrics.json ]; then
            cp -f data/account_strategy_metrics.json site_prev/cache/account_strategy_metrics.json
          elif [ -f cache/account_strategy_metrics.json ]; then
            cp -f cache/account_strategy_metrics.json site_prev/cache/account_strategy_metrics.json
          fi
          cp -f cache/stock_research_realtime_quotes-*.json site_prev/cache/ 2>/dev/null || true
          cp -f cache/intraday_slices-*.json site_prev/cache/ 2>/dev/null || true
          cfiles=( $(ls -1 site_prev/cache/market_data-*.json 2>/dev/null | sort || true) )
          if [ ${#cfiles[@]} -gt 7 ]; then
            rm -f "${cfiles[@]:0:${#cfiles[@]}-7}"
          fi
          sfiles=( $(ls -1 site_prev/cache/intraday_slices-*.json 2>/dev/null | sort || true) )
          if [ ${#sfiles[@]} -gt 2 ]; then
            rm -f "${sfiles[@]:0:${#sfiles[@]}-2}"
          fi
          rfiles=( $(ls -1 site_prev/cache/stock_research_realtime_quotes-*.json 2>/dev/null | sort || true) )
          if [ ${#rfiles[@]} -gt 7 ]; then
            rm -f "${rfiles[@]:0:${#rfiles[@]}-7}"
          fi

          cp -f ./cache_online/intraday_resonance-*.json site_prev/ 2>/dev/null || true

          if git -C site_prev diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git -C site_prev status --porcelain
          git -C site_prev config user.name "github-actions[bot]"
          git -C site_prev config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site_prev add -A
          git -C site_prev commit -m "deploy: update report" || true
          push_rc=1
          for attempt in 1 2 3; do
            if git -C site_prev push origin HEAD:gh-pages; then
              echo "Push to gh-pages succeeded on attempt ${attempt}"
              push_rc=0
              break
            fi
            push_rc=$?
            echo "Push to gh-pages failed on attempt ${attempt} (rc=${push_rc})"
            if [ "${attempt}" -lt 3 ]; then
              sleep $((attempt * 10))
              git -C site_prev fetch origin gh-pages || true
              git -C site_prev rebase origin/gh-pages || {
                git -C site_prev rebase --abort || true
                echo "Rebase against origin/gh-pages failed; retrying push without rebase"
              }
            fi
          done
          exit "${push_rc}"
