name: Publish GitHub Pages

on:
  # 手动触发（推荐）
  workflow_dispatch: {}
  # 提交代码后触发（main 分支）
  push:
    branches:
      - main
  # 定时触发（可按需调整；cron 为 UTC）
  schedule:
    # 说明：GitHub Actions 的 cron 只支持 UTC，不能直接写“北京时间”。
    # 这里选择“每个工作日每小时的第 1 分钟触发一次”，再在脚本里用北京时间判断：
    # - 仅当北京时间 == 15:01 才继续执行
    - cron: "1 * * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Beijing time (schedule only)
        id: timecheck
        if: ${{ github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          now_bj="$(TZ=Asia/Shanghai date +'%H:%M')"
          target="15:01"
          echo "beijing_now=${now_bj}"
          if [ "${now_bj}" != "${target}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Not target time (${target}), skip."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Target time hit (${target}), continue."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        with:
          python-version: "3.11"

      - name: Make scripts executable
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          chmod +x ./qr.sh || true

      - name: Generate latest report (online, costs API)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
        run: |
          if [ -z "${BIYING_TOKEN}" ]; then
            echo "Missing secrets.BIYING_TOKEN"
            exit 2
          fi
          ./qr.sh fetch

      - name: Prepare Pages site (html/ as site root)
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          report_html="$(ls -t ./html/*tab-v1.html 2>/dev/null | head -n 1 || true)"
          if [ -z "${report_html}" ]; then
            echo "No report html found in ./html/"
            ls -la ./html || true
            exit 2
          fi
          cp -f "${report_html}" ./html/index.html
          echo "site=index.html from: ${report_html}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
        with:
          path: ./html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: ${{ github.event_name != 'schedule' || steps.timecheck.outputs.skip != 'true' }}
