name: Watch Live (AkShare)

on:
  # 交易时段：每 5 分钟跑一次（cron 为 UTC，北京时间=UTC+8）
  # 覆盖 09:25~15:05 左右：UTC 01:25~07:05
  schedule:
    - cron: "*/5 1-7 * * 1-5"
  workflow_dispatch: {}

permissions:
  # 你的 Pages 采用 “Deploy from branch: gh-pages”，因此这里需要把结果直接提交到 gh-pages 分支
  contents: write

concurrency:
  group: "gh-pages-live"
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
  BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (akshare)
        run: |
          python -m pip install -U pip
          # akshare 依赖较多，显式安装可减少“半路拉取卡死/缺依赖”
          pip install akshare pandas numpy py-mini-racer akracer curl_cffi html5lib jsonpath --break-system-packages

      - name: Checkout gh-pages (existing site)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site_prev
          fetch-depth: 1
          persist-credentials: true

      - name: Inject live data into existing HTML
        run: |
          set -euo pipefail
          if [ -z "${BIYING_TOKEN}" ]; then
            echo "Missing secrets.BIYING_TOKEN"
            exit 2
          fi
          # 直接把实时数据注入到现有页面（不新建页面，不依赖前端 fetch）
          args="--html site_prev/index.html"
          for f in site_prev/*tab-v1.html; do
            if [ -f "$f" ]; then args="$args --html $f"; fi
          done
          # 注入脚本在 main 仓库里；目标 HTML 在 site_prev（gh-pages 分支）
          # 注意：不要 cd 到 main，否则相对路径 site_prev/* 会失效
          PYTHONPATH=main python -m daily_review.inject_live_into_html $args
          touch site_prev/.nojekyll

      - name: Commit & push to gh-pages
        run: |
          set -euo pipefail
          # 若没有变化则直接退出（避免空提交）
          if git -C site_prev diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git -C site_prev status --porcelain
          git -C site_prev config user.name "github-actions[bot]"
          git -C site_prev config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site_prev add -A
          git -C site_prev commit -m "chore(live): inject realtime snapshot" || true
          git -C site_prev push origin gh-pages
