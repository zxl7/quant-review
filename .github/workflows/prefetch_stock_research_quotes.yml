name: Prefetch stock research quotes

on:
  workflow_dispatch:
    inputs:
      date10:
        description: "指定交易日（YYYY-MM-DD），留空则自动判断"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "25 1 * * 1-5"

permissions:
  contents: write

concurrency:
  group: ${{ github.event_name == 'schedule' && 'stock-research-prefetch-schedule-0925' || format('stock-research-prefetch-dispatch-{0}', github.ref_name) }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TZ: Asia/Shanghai
  PYTHONUNBUFFERED: "1"

jobs:
  prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Seed cache from repository cache_online/
        run: |
          set -euo pipefail
          mkdir -p cache
          if [ -d "cache_online" ]; then
            cp -f cache_online/*.json cache/ 2>/dev/null || true
          fi

      - name: Checkout gh-pages cache
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site_prev
          fetch-depth: 1
          persist-credentials: true

      - name: Restore stock research cache from gh-pages
        run: |
          set -euo pipefail
          mkdir -p cache site_prev/cache
          cp -f site_prev/cache/stock_research_backtest_source.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/stock_research_realtime_quotes-*.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/trade_days_cache.json cache/ 2>/dev/null || true
          rfiles=( $(ls -1 cache/stock_research_realtime_quotes-*.json 2>/dev/null | sort || true) )
          if [ ${#rfiles[@]} -gt 7 ]; then
            rm -f "${rfiles[@]:0:${#rfiles[@]}-7}"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check A-share trade day
        id: tradeday
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
          INPUT_DATE10: ${{ github.event.inputs.date10 || '' }}
        run: |
          set -euo pipefail
          if [ -z "${BIYING_TOKEN}" ]; then
            echo "Missing secrets.BIYING_TOKEN"
            exit 2
          fi
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import re
          from pathlib import Path

          from daily_review.config import load_config_from_env
          from daily_review.data.biying import get_recent_trade_dates, get_realtime_market_date
          from daily_review.http import HttpClient

          cache_dir = Path("cache")
          input_date10 = os.environ.get("INPUT_DATE10", "").strip()
          if input_date10 and not re.match(r"^\d{4}-\d{2}-\d{2}$", input_date10):
              raise SystemExit(f"Invalid workflow_dispatch input date10={input_date10}, expected YYYY-MM-DD")

          def collect_local_trade_days() -> list[str]:
              out = set()
              trade_days_path = cache_dir / "trade_days_cache.json"
              try:
                  if trade_days_path.exists():
                      data = json.loads(trade_days_path.read_text(encoding="utf-8"))
                      days = data.get("days") or []
                      for day in days:
                          if isinstance(day, str) and re.match(r"^\d{4}-\d{2}-\d{2}$", day):
                              out.add(day)
              except Exception:
                  pass
              try:
                  for fp in cache_dir.glob("stock_research_realtime_quotes-*.json"):
                      data = json.loads(fp.read_text(encoding="utf-8"))
                      as_of = str(data.get("as_of") or "").strip()
                      if re.match(r"^\d{4}-\d{2}-\d{2}", as_of):
                          out.add(as_of[:10])
              except Exception:
                  pass
              return sorted(out)

          today = dt.datetime.now().strftime("%Y-%m-%d")
          local_days = collect_local_trade_days()
          cfg = load_config_from_env()
          client = HttpClient(base_url=cfg.base_url, token=cfg.token, timeout=30)
          remote_days = get_recent_trade_dates(client, n=20) or []
          realtime_market_date = get_realtime_market_date(client)
          merged_days = sorted(set(local_days) | set(remote_days) | ({realtime_market_date} if realtime_market_date else set()))

          if input_date10:
              target_date = input_date10
          else:
              target_date = today

          is_today_trade_day = today in merged_days or realtime_market_date == today
          target_is_trade_day = target_date in merged_days or target_date == realtime_market_date
          should_run = target_date == today and is_today_trade_day
          is_trade_today = "true" if is_today_trade_day else "false"
          latest_trade_date = merged_days[-1] if merged_days else target_date
          target_is_trade_day_text = "true" if target_is_trade_day else "false"
          should_run_text = "true" if should_run else "false"
          skip_reason = ""
          if should_run:
              skip_reason = "ready"
          elif target_date != today:
              skip_reason = "target_date_not_today"
          elif not is_today_trade_day:
              skip_reason = "today_not_trade_day"
          elif not target_is_trade_day:
              skip_reason = "target_not_trade_day"
          else:
              skip_reason = "unknown"

          print(f"DEBUG: today_bj={today}")
          print(f"DEBUG: target_date={target_date}")
          print(f"DEBUG: latest_trade_date={latest_trade_date}")
          print(f"DEBUG: realtime_market_date={realtime_market_date}")
          print(f"DEBUG: is_trade_today={is_trade_today}")
          print(f"DEBUG: target_is_trade_day={target_is_trade_day_text}")
          print(f"DEBUG: should_run={should_run_text}")
          print(f"DEBUG: skip_reason={skip_reason}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"today_bj={today}\n")
              fh.write(f"target_date={target_date}\n")
              fh.write(f"latest_trade_date={latest_trade_date}\n")
              fh.write(f"realtime_market_date={realtime_market_date}\n")
              fh.write(f"is_trade_today={is_trade_today}\n")
              fh.write(f"target_is_trade_day={target_is_trade_day_text}\n")
              fh.write(f"should_run={should_run_text}\n")
              fh.write(f"skip_reason={skip_reason}\n")
          PY

      - name: Log skip reason
        if: ${{ steps.tradeday.outputs.should_run != 'true' }}
        run: |
          echo "Skip prefetch: target_date=${{ steps.tradeday.outputs.target_date }} today_bj=${{ steps.tradeday.outputs.today_bj }} reason=${{ steps.tradeday.outputs.skip_reason }}"

      - name: Run 09:25 stock research quote prefetch
        if: ${{ steps.tradeday.outputs.should_run == 'true' }}
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
        run: |
          set -euo pipefail
          run_date="${{ steps.tradeday.outputs.target_date }}"
          python3 scripts/prefetch_stock_research_quotes.py --date "${run_date}" --must-succeed

      - name: Verify snapshot file exists
        if: ${{ steps.tradeday.outputs.should_run == 'true' }}
        env:
          RUN_DATE: ${{ steps.tradeday.outputs.target_date }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from daily_review.application.workflow_schedule import describe_prefetched_quotes_snapshot

          run_date = os.environ["RUN_DATE"]
          snapshot = describe_prefetched_quotes_snapshot(Path("cache"), run_date)
          print("prefetched_snapshot=" + json.dumps(snapshot, ensure_ascii=False, sort_keys=True))
          if not snapshot["found"]:
              raise SystemExit(f"Missing valid prefetched quote snapshot for {run_date}")
          PY

      - name: Commit prefetched snapshot to gh-pages
        if: ${{ steps.tradeday.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p site_prev/cache
          cp -f cache/stock_research_realtime_quotes-*.json site_prev/cache/ 2>/dev/null || true
          rfiles=( $(ls -1 site_prev/cache/stock_research_realtime_quotes-*.json 2>/dev/null | sort || true) )
          if [ ${#rfiles[@]} -gt 7 ]; then
            rm -f "${rfiles[@]:0:${#rfiles[@]}-7}"
          fi
          if git -C site_prev diff --quiet; then
            echo "No prefetched snapshot changes to commit."
            exit 0
          fi
          git -C site_prev status --porcelain
          git -C site_prev config user.name "github-actions[bot]"
          git -C site_prev config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site_prev add -A cache
          git -C site_prev commit -m "cache: prefetch stock research quotes" || true
          push_rc=1
          for attempt in 1 2 3; do
            if git -C site_prev push origin HEAD:gh-pages; then
              echo "Push prefetched snapshot to gh-pages succeeded on attempt ${attempt}"
              push_rc=0
              break
            fi
            push_rc=$?
            echo "Push prefetched snapshot failed on attempt ${attempt} (rc=${push_rc})"
            if [ "${attempt}" -lt 3 ]; then
              sleep $((attempt * 5))
              git -C site_prev fetch origin gh-pages || true
              git -C site_prev rebase origin/gh-pages || {
                git -C site_prev rebase --abort || true
                echo "Rebase against origin/gh-pages failed; retrying push without rebase"
              }
            fi
          done
          exit "${push_rc}"
