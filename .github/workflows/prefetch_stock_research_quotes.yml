name: Prefetch Stock Research Quotes

on:
  workflow_dispatch:
    inputs:
      date10:
        description: "指定运行日期（YYYY-MM-DD），留空则使用北京时间今天"
        required: false
        default: ""
        type: string
  schedule:
    # GitHub Actions 的 schedule 不保证严格命中单分钟。
    # 改成 09:26-09:29（北京时间）每分钟尝试一次，明确落在 09:25 之后，
    # 避免最后一分钟竞价仍未稳定时被提前触发；脚本内部仍只放行 09:25-09:30 的真实业务窗口。
    - cron: "26-29 1 * * 1-5"

permissions:
  contents: write

concurrency:
  group: "stock-research-prefetch"
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai
  PYTHONUNBUFFERED: "1"

jobs:
  prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed cache from repository cache_online/
        run: |
          set -euo pipefail
          mkdir -p cache
          if [ -d "cache_online" ]; then
            cp -f cache_online/*.json cache/ 2>/dev/null || true
          fi

      - name: Checkout gh-pages cache
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site_prev
          fetch-depth: 1
          persist-credentials: true

      - name: Restore market cache from gh-pages
        run: |
          set -euo pipefail
          mkdir -p cache
          mkdir -p site_prev/cache
          cp -f site_prev/cache/market_data-*.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/stock_research_backtest_source.json cache/ 2>/dev/null || true
          cp -f site_prev/cache/stock_research_realtime_quotes-*.json cache/ 2>/dev/null || true

      - name: Prefetch 09:25 stock research quotes
        env:
          BIYING_TOKEN: ${{ secrets.BIYING_TOKEN }}
          BIYING_BASE_URL: ${{ secrets.BIYING_BASE_URL }}
          INPUT_DATE10: ${{ github.event.inputs.date10 || '' }}
        run: |
          set -euo pipefail
          if [ -z "${BIYING_TOKEN}" ]; then
            echo "Skip prefetch: missing BIYING_TOKEN"
            exit 0
          fi
          run_date="${INPUT_DATE10:-$(date +%F)}"
          PYTHONPATH=. python3 scripts/prefetch_stock_research_quotes.py --date "${run_date}"

      - name: Sync prefetched quotes back to gh-pages
        run: |
          set -euo pipefail
          mkdir -p site_prev/cache
          cp -f cache/stock_research_realtime_quotes-*.json site_prev/cache/ 2>/dev/null || true
          rfiles=( $(ls -1 site_prev/cache/stock_research_realtime_quotes-*.json 2>/dev/null | sort || true) )
          if [ ${#rfiles[@]} -gt 7 ]; then
            rm -f "${rfiles[@]:0:${#rfiles[@]}-7}"
          fi
          if git -C site_prev diff --quiet; then
            echo "No prefetched quote cache changes."
            exit 0
          fi
          git -C site_prev status --porcelain
          git -C site_prev config user.name "github-actions[bot]"
          git -C site_prev config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site_prev add -A
          git -C site_prev commit -m "cache: prefetch stock research quotes" || true
          git -C site_prev push origin HEAD:gh-pages
